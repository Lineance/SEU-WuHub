<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SEU-WuHub Showcase Banner</title>
  <desc id="desc">A clean and light showcase banner for SEU-WuHub.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FCFF"/>
      <stop offset="0.55" stop-color="#EEF7FF"/>
      <stop offset="1" stop-color="#E9F4FF"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.97"/>
      <stop offset="1" stop-color="#F6FBFF" stop-opacity="0.97"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="24" fill="url(#bg)"/>

  <circle cx="1010" cy="60" r="140" fill="#60A5FA" fill-opacity="0.14" filter="url(#soft)"/>
  <circle cx="160" cy="310" r="140" fill="#34D399" fill-opacity="0.14" filter="url(#soft)"/>

  <rect x="72" y="44" width="1056" height="272" rx="24" fill="url(#card)" stroke="#CFE3F8"/>

  <rect x="112" y="82" width="102" height="30" rx="15" fill="#DBECFF" stroke="#B8D8FF"/>
  <text x="163" y="102" text-anchor="middle" font-size="13" font-family="Segoe UI, Arial, sans-serif" fill="#245C9C">Open Source</text>

  <text x="112" y="160" font-size="52" font-weight="700" font-family="Segoe UI, Arial, sans-serif" fill="#0F2A4A">SEU-WuHub</text>
  <text x="112" y="198" font-size="22" font-family="Segoe UI, Arial, sans-serif" fill="#365D86">Campus Information Aggregation Platform</text>

  <text x="112" y="244" font-size="17" font-family="Segoe UI, Arial, sans-serif" fill="#2F567E">Hybrid Retrieval + ReAct Agent</text>
  <text x="112" y="272" font-size="17" font-family="Segoe UI, Arial, sans-serif" fill="#2F567E">FastAPI | Next.js | LanceDB</text>

  <rect x="112" y="290" width="320" height="8" rx="4" fill="#D7E7F7"/>
  <rect x="112" y="290" width="236" height="8" rx="4" fill="url(#accent)"/>
</svg>
