version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - LANCEDB_PATH=/app/data/lancedb
    volumes:
      - ./backend:/app/backend
      - ./config:/app/config
      - lancedb_data:/app/data/lancedb
    networks:
      - wuhub-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - wuhub-network
    restart: unless-stopped

volumes:
  lancedb_data:

networks:
  wuhub-network:
    driver: bridge
