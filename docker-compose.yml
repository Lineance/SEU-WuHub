version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - LANCEDB_PATH=/app/data/lancedb
    volumes:
      - ./backend:/app/backend
      - ./config:/app/config
      - lancedb_data:/app/data/lancedb
    networks:
      - wuhub-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - wuhub-network
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.12
    ports:
      - "7700:7700"
    volumes:
      - ./data/meilisearch.ms:/meili_data
    environment:
      - MEILI_ENV=development
      - MEILI_NO_ANALYTICS=true
      - MEILI_DB_PATH=/meili_data
    networks:
      - wuhub-network
    restart: unless-stopped

volumes:
  lancedb_data:
  meilisearch_data:

networks:
  wuhub-network:
    driver: bridge
