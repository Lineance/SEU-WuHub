# JWC list incremental crawling config

website:
  name: "SEU JWC"
  base_url: "https://jwc.seu.edu.cn"

  # Multiple list channels under the same site; each list will keep independent incremental state.
  start_urls:
    - "https://jwc.seu.edu.cn/jwxx/list.htm"
    - "https://jwc.seu.edu.cn/zxdt/list.htm"

  list_incremental:
    enabled: true
    max_pages: 31
    state_file: "tmp/jwc_seen_urls.json"
    cache_base_directory: "tmp/crawl4ai_jwc_cache"

    # Keep article detail pages and exclude list/navigation pages
    include_patterns:
      - "jwc\\.seu\\.edu\\.cn/\\d{4}/\\d{4}/c\\w+/page\\.htm$"
    exclude_patterns:
      - "/list\\d*\\.htm$"
      - "javascript:"
      - "_upload/tpl/"

  overrides:
    # List-page crawling stage overrides
    list_crawler:
      cache_mode: "ENABLED"
      check_cache_freshness: true
      cache_validation_timeout: 3600
      word_count_threshold: 20
      page_timeout: 45000
      remove_overlay_elements: true
      exclude_external_links: true

    # Article crawling stage overrides
    article_crawler:
      cache_mode: "DISABLED"
      check_cache_freshness: false
      cache_validation_timeout: 3600
      word_count_threshold: 20
      page_timeout: 45000
      remove_overlay_elements: true
      exclude_external_links: true
      # Extract only article content using CSS selector
      css_selector: ".Article_Content"
      excluded_tags:
        - "nav"
        - "header"
        - "footer"
        - "script"
        - "style"
      # Metadata extraction selectors (used by ArticleUrlCrawler._extract_metadata)
      # These are processed on FULL HTML to extract structured fields
      target_elements:
        - ".Article_Title"      # Title selector (span element)
        - ".News-title"         # Alternative title selector (table element)
        - ".Article_PublishDate" # Date selector
        - ".Article_Content"   # Content selector
        - ".wp_articlecontent" # Alternative content selector
      # Note: Author extraction is not available via CSS selector on JWC pages
      # Author information is embedded within article content (e.g., under "报告人简介" section)
      markdown_generator:
        type: "default"
        content_source: "fit_html"
        options:
          ignore_images: false
          skip_internal_links: true
          body_width: 0

    browser:
      headless: true
      light_mode: true
