# BrowserConfig - 控制浏览器环境
# 所有参数通过此文件配置，无需修改代码
# 支持的参数列表见 crawl4ai.BrowserConfig 文档

browser:
  # 浏览器类型
  browser_type: "chromium"  # chromium, firefox, webkit
  
  # 显示模式
  headless: true  # 无头模式，false用于调试
  
  # 视口大小
  viewport_width: 1280
  viewport_height: 720
  
  # 用户代理
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
  user_agent_mode: "random"  # 或 "random" 随机User-Agent
  
  # 代理配置
  proxy_config: null  # 示例: {"server": "http://proxy:8080", "username": "user", "password": "pass"}
  
  # 持久化会话（用于增量更新）
  use_persistent_context: false
  user_data_dir: null  # 持久化数据目录，如 "./browser_data"
  
  # 浏览器模式
  browser_mode: "dedicated"  # dedicated, builtin, custom, docker
  use_managed_browser: false
  
  # 连接设置
  cdp_url: null  # Chrome DevTools Protocol URL
  debugging_port: 9222
  host: "localhost"
  
  # 下载设置
  accept_downloads: false
  downloads_path: null
  
  # 存储状态
  storage_state: null  # 恢复浏览器状态
  
  # 安全设置
  ignore_https_errors: true  # 忽略HTTPS证书错误
  
  # JavaScript设置
  java_script_enabled: true
  
  # 关闭延迟
  sleep_on_close: false
  
  # Cookie和Header
  cookies: []
  headers: {}
  
  # 性能模式
  text_mode: false  # 文本模式，禁用图片
  light_mode: false  # 轻量模式
  
  # 额外参数
  extra_args: []
  
  # 反检测
  enable_stealth: true  # 启用反检测模式
  
  # Chrome通道
  chrome_channel: "chromium"  # chrome, msedge
  