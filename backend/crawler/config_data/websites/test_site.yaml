# 测试网站配置
# 使用 httpbin.org 进行测试，这是一个可靠的测试网站

website:
  name: "测试网站"
  base_url: "https://httpbin.org"
  
  # 起始URL列表
  start_urls:
    - "https://httpbin.org/html"
    - "https://httpbin.org/robots.txt"

  # 内容选择器
  selectors:
    title: "h1"
    content: "body"
  
  # 覆盖通用配置
  overrides:
    crawler:
      cache_mode: "DISABLED"  # 测试时禁用缓存
      page_timeout: 10000  # 10秒超时
      word_count_threshold: 10
      headless: true