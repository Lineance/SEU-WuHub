# 东大官网配置

website:
  name: "东南大学官网"
  base_url: "https://www.seu.edu.cn/"
  
  # 起始URL列表
  start_urls:
    - "https://www.seu.edu.cn/"
  
  # 覆盖通用配置
  overrides:
    crawler:
      cache_mode: "ENABLED"
      page_timeout: 45000
      word_count_threshold: 30
      pdf: true
      exclude_all_images: true
      scan_full_page: true

      deep_crawl_strategy:  # 深度爬取策略配置
        enabled: false  # 是否启用深度爬取
        max_depth: 3  # 最大爬取深度
        max_pages: 5  # 最大页面数
        same_domain_only: false  # 是否仅爬取相同域名
    
    browser:
      light_mode: true  # 轻量模式
    
  