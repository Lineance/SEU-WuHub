# 示例网站配置
# 这是一个示例配置文件，用于测试和演示

website:
  name: "示例网站"
  base_url: "https://example.com"
  
  # 起始URL列表
  start_urls:
    - "https://example.com"
    - "https://example.com/about"

  deep_crawl:
    enabled: true        # 关键：设置为 true 开启深度爬取
    max_depth: 2         # 爬取深度
    max_pages: 20        # 最大页面数
    same_domain_only: true
    delay_between_requests: 2.0
  
  # 内容选择器
  selectors:
    title: "h1, h2, .title, .heading"
    content: "main, article, .content, .article"
    publish_date: "time, .date, .published"
    author: ".author, .byline, .writer"
  
  # 覆盖通用配置
  overrides:
    crawler:
      cache_mode: "ENABLED"
      page_timeout: 45000
      word_count_threshold: 100
  