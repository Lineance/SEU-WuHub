# CrawlerRunConfig - 控制爬取行为
# 所有参数通过此文件配置，无需修改代码

crawler:
  # ==================== 缓存配置（关键：实现自动增量更新）====================
  cache_mode: "ENABLED"  # 缓存模式: ENABLED, DISABLED, READ_ONLY, WRITE_ONLY, BYPASS
  cache_validation_timeout: 3600  # 缓存验证超时（秒）
  check_cache_freshness: true  # 检查缓存新鲜度
  
  # ==================== 内容处理配置 ====================
  word_count_threshold: 50  # 跳过少于X词的文本块
  css_selector: null  # 仅保留匹配此选择器的部分，如 "main.article-content"
  target_elements: null  # 目标元素列表，如 [".article", ".content"]
  excluded_tags: ["script", "style", "nav", "footer"]  # 排除的标签
  excluded_selector: null  # 排除的选择器，如 "#ads, .tracker"
  only_text: false  # 仅提取文本
  prettiify: false  # 美化HTML
  keep_data_attributes: false  # 保留data-*属性
  keep_attrs: []  # 保留的属性列表，如 ["id", "class"]
  remove_forms: false  # 移除所有<form>元素
  parser_type: "lxml"  # HTML解析器: lxml, html.parser
  
  # ==================== 页面导航和等待配置 ====================
  wait_until: "networkidle"  # 等待条件: domcontentloaded, networkidle, load
  page_timeout: 30000  # 页面超时（毫秒）
  wait_for: null  # 等待条件，如 "css:.article-loaded" 或 "js:() => true"
  wait_for_timeout: null  # 等待超时（毫秒）
  wait_for_images: false  # 等待图片加载
  delay_before_return_html: 0.1  # 返回HTML前的延迟（秒）
  check_robots_txt: false  # 检查robots.txt
  mean_delay: 0.1  # 平均延迟（秒）
  max_range: 0.3  # 最大延迟范围（秒）
  semaphore_count: 5  # 最大并发数
  
  # ==================== JavaScript执行配置 ====================
  js_code: null  # JavaScript代码，如 "document.querySelector('button')?.click();"
  c4a_script: null  # C4A脚本
  js_only: false  # 仅执行JavaScript
  ignore_body_visibility: true  # 忽略body可见性检查
  scan_full_page: false  # 扫描完整页面（无限滚动）
  scroll_delay: 0.2  # 滚动延迟（秒）
  max_scroll_steps: null  # 最大滚动步数
  process_iframes: false  # 处理iframe内容
  remove_overlay_elements: false  # 移除覆盖元素
  simulate_user: false  # 模拟用户交互
  override_navigator: false  # 覆盖navigator属性
  magic: false  # 自动处理弹窗（实验性）
  adjust_viewport_to_content: false  # 调整视口到内容
  
  # ==================== 媒体处理配置 ====================
  screenshot: false  # 截图
  screenshot_wait_for: null  # 截图前等待时间
  screenshot_height_threshold: 20000  # 截图高度阈值
  pdf: false  # 生成PDF
  capture_mhtml: false  # 捕获MHTML
  image_description_min_word_threshold: 50  # 图片描述最小词数
  image_score_threshold: 3  # 图片分数阈值
  exclude_external_images: false  # 排除外部图片
  exclude_all_images: false  # 排除所有图片
  table_score_threshold: 7  # 表格分数阈值
  
  # ==================== 链接/域名处理配置 ====================
  exclude_social_media_domains: []  # 排除的社交媒体域名
  exclude_external_links: false  # 排除外部链接
  exclude_social_media_links: false  # 排除社交媒体链接
  exclude_domains: []  # 排除的域名列表
  exclude_internal_links: false  # 排除内部链接
  score_links: false  # 评分链接
  preserve_https_for_internal_links: false  # 为内部链接保留HTTPS
  
  # ==================== 调试和日志配置 ====================
  verbose: false  # 详细日志
  log_console: false  # 记录控制台输出
  capture_network_requests: false  # 捕获网络请求
  capture_console_messages: false  # 捕获控制台消息
  
  # ==================== 连接和HTTP配置 ====================
  method: "GET"  # HTTP方法
  stream: false  # 流模式
  url: null  # URL（内部使用）
  user_agent: null  # 用户代理（覆盖浏览器配置）
  user_agent_mode: null  # 用户代理模式
  user_agent_generator_config: {}  # 用户代理生成配置
  
  # ==================== 虚拟滚动配置 ====================
  virtual_scroll_config: null  # 虚拟滚动配置
  
  # ==================== URL匹配配置 ====================
  url_matcher: null  # URL匹配器
  match_mode: "OR"  # 匹配模式: OR, AND
  
  # ==================== 深度爬取配置 ====================
  deep_crawl_strategy:  # 深度爬取策略配置
    enabled: false  # 是否启用深度爬取
    max_depth: 3  # 最大爬取深度
    max_pages: 100  # 最大页面数
    same_domain_only: true  # 是否仅爬取相同域名
    follow_links: true  # 是否跟随链接
    respect_robots_txt: true  # 是否遵守robots.txt
    delay_between_requests: 1.0  # 请求间延迟（秒）
    
    # PDF自动识别和处理
    auto_detect_pdf: true  # 自动识别PDF链接
    pdf_processing:  # PDF处理配置
      enabled: true  # 是否处理PDF文件
      convert_to_markdown: true  # 是否转换为Markdown
      save_pdf_files: false  # 是否保存PDF文件
      pdf_output_path: "./output/pdf_files/{timestamp}_{filename}.pdf"
      extract_metadata: true  # 是否提取PDF元数据
      max_pdf_size_mb: 50  # 最大PDF文件大小（MB）
      
    # URL过滤规则
    url_filters:  # URL过滤配置
      include_patterns:  # 包含模式
        - "\\.pdf$"  # PDF文件
        - "\\.html?$"  # HTML文件
        - "\\.txt$"  # 文本文件
      exclude_patterns:  # 排除模式
        - "/private/"  # 私有目录
        - "/admin/"  # 管理后台
        - "/api/"  # API接口
        - "\\.(jpg|jpeg|png|gif|mp4|mp3)$"  # 媒体文件
      domain_whitelist: []  # 域名白名单（空表示允许所有）
      domain_blacklist: []  # 域名黑名单
      
    # 内容过滤规则
    content_filters:  # 内容过滤配置
      min_word_count: 100  # 最小词数
      required_keywords: []  # 必需关键词
      excluded_keywords: []  # 排除关键词
      language: "zh-CN"  # 内容语言
      
    # 性能优化
    performance:  # 性能配置
      concurrent_requests: 3  # 并发请求数
      timeout_per_page: 30000  # 每页超时时间（毫秒）
      retry_attempts: 2  # 重试次数
      use_cache: true  # 使用缓存
      cache_ttl: 86400  # 缓存生存时间（秒）
      
  link_preview_config: null  # 链接预览配置
  experimental: null  # 实验性功能
  
  # ==================== 地理位置和本地化 ====================
  locale: null  # 本地化，如 "en-US", "zh-CN"
  timezone_id: null  # 时区，如 "Asia/Shanghai"
  geolocation: null  # 地理位置配置
  fetch_ssl_certificate: false  # 获取SSL证书
  
  # ==================== 代理配置 ====================
  proxy_config: null  # 代理配置
  proxy_rotation_strategy: null  # 代理轮换策略
  
  # ==================== 会话配置 ====================
  session_id: null  # 会话ID
  bypass_cache: false  # 绕过缓存（已弃用，使用cache_mode）
  disable_cache: false  # 禁用缓存（已弃用，使用cache_mode）
  no_cache_read: false  # 不读取缓存（已弃用，使用cache_mode）
  no_cache_write: false  # 不写入缓存（已弃用，使用cache_mode）
  shared_data: null  # 共享数据
  
  # 备注：修改此文件后无需重启程序，配置会自动重新加载